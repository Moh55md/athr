<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر الكلمات | محمد يتيم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Reem+Kufi:wght@400;700;900&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold-primary: #c5a059; --gold-dark: #8e6d2f; --ink-black: #080808; }
        body { background-color: var(--ink-black); color: #e5e5e5; font-family: 'Cairo', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .reem { font-family: 'Reem Kufi', sans-serif; }
        .amiri { font-family: 'Amiri', serif; }
        
        .gold-gradient { background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(20px); border: 1px solid rgba(197, 160, 89, 0.1); transition: all 0.5s ease; }
        .glass-card:hover { border-color: var(--gold-primary); background: rgba(197, 160, 89, 0.03); transform: translateY(-5px); }
        
        .visitor-counter { border: 1px solid var(--gold-primary); padding: 8px 20px; border-radius: 50px; font-weight: bold; background: rgba(197, 160, 89, 0.05); }
        .ornament { position: relative; padding: 0 50px; color: var(--gold-primary); letter-spacing: 0.3em; font-size: 0.8rem; }
        .ornament::before, .ornament::after { content: "❦"; position: absolute; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }
        .ornament::before { right: 0; } .ornament::after { left: 0; }
        
        .admin-section { display: none; }
        .admin-active .admin-section { display: block; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] border-b border-white/5 py-5 px-6 md:px-12 flex justify-between items-center backdrop-blur-xl">
        <div class="text-2xl md:text-3xl font-black reem gold-gradient">أثر الكلمات</div>
        <div class="flex gap-6 md:gap-10 text-[10px] md:text-xs font-bold items-center uppercase tracking-widest">
            <a href="#hero" class="hover:text-[#c5a059] transition">البداية</a>
            <a href="#library" class="hover:text-[#c5a059] transition">الخزانة</a>
            <a href="#community" class="hover:text-[#c5a059] transition">خواطر الزوار</a>
            <button onclick="toggleAdmin()" class="border border-[#c5a059] text-[#c5a059] px-5 py-2 hover:bg-[#c5a059] hover:text-black transition duration-500">المالك</button>
        </div>
    </nav>

    <header id="hero" class="min-h-screen flex flex-col justify-center items-center text-center px-6 relative">
        <!-- التعديل: حذف كلمة "الخاصة" -->
        <div class="ornament mb-6">مكتبة محمد يتيم</div> 
        <h1 class="text-8xl md:text-[12rem] font-black reem leading-none mb-8 gold-gradient">أثـر</h1>
        <p class="amiri text-2xl md:text-4xl max-w-3xl leading-relaxed text-gray-300 italic">
            "نحن لا نكتب الكلمات، بل نترك أثراً يقتفيه العابرون في صحراء الفكر."
        </p>
        <div class="mt-16">
            <div class="visitor-counter text-[#c5a059] reem">
                أثر الزوار: <span id="count">...</span>
            </div>
        </div>
    </header>

    <section id="master-admin" class="admin-section py-20 max-w-2xl mx-auto px-6">
        <div class="glass-card p-10 rounded-lg text-center border-orange-500/30">
            <h2 class="text-2xl font-bold mb-8 gold-gradient reem">تخليد أثر جديد</h2>
            <div class="space-y-6">
                <input id="adm-poet" type="text" placeholder="اسم الشاعر" class="w-full bg-transparent border-b border-gold-primary/30 py-3 outline-none text-center amiri text-2xl">
                <input id="adm-title" type="text" placeholder="الموضوع" class="w-full bg-transparent border-b border-gold-primary/30 py-3 outline-none text-center amiri text-2xl">
                <textarea id="adm-content" placeholder="اكتب النص هنا..." class="w-full bg-transparent border border-gold-primary/20 p-4 rounded outline-none amiri text-2xl text-center" rows="4"></textarea>
                <button onclick="addPoemToLib()" class="w-full bg-[#c5a059] text-black font-bold py-4 hover:bg-white transition duration-500">تثبيت في الخزانة</button>
            </div>
        </div>
    </section>

    <section id="library" class="py-32 max-w-7xl mx-auto px-6">
        <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-8">
            <div>
                <h2 class="text-5xl font-black reem mb-2">خزانة الأدب</h2>
                <div class="h-1 w-20 bg-[#c5a059]"></div>
            </div>
            <input id="libSearch" onkeyup="searchLib()" type="text" placeholder="ابحث في الأثر..." class="bg-transparent border-b border-gold-primary/40 py-2 w-full md:w-80 outline-none amiri text-xl italic text-[#c5a059]">
        </div>
        <div id="library-display" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </section>

    <!-- التعديل: قسم خواطر الناس -->
    <section id="community" class="py-32 bg-white/5">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-black reem mb-8 gold-gradient">اترك أثرك</h2>
            <p class="amiri text-xl mb-10 text-gray-400">"هنا مساحة لزوارنا لمشاركة خواطرهم وأفكارهم"</p>
            <div class="glass-card p-8 rounded-2xl mb-12">
                <input id="visitor-name" type="text" placeholder="اسمك" class="w-full bg-transparent border-b border-gold-primary/30 py-3 mb-4 outline-none text-center amiri text-xl">
                <textarea id="visitor-thought" placeholder="بماذا يفكر قلبك الآن؟" class="w-full bg-transparent border border-gold-primary/10 p-4 rounded-lg outline-none amiri text-xl text-center" rows="3"></textarea>
                <button onclick="postThought()" class="mt-6 px-10 py-3 border border-[#c5a059] text-[#c5a059] hover:bg-[#c5a059] hover:text-black transition">نشر الخاطرة</button>
            </div>
            <div id="thoughts-wall" class="grid gap-6"></div>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-white/5">
        <div class="text-2xl reem gold-gradient mb-4">محمد يتيم</div>
        <p class="amiri text-gray-500 italic">جميع الحقوق محفوظة لصاحب الأثر © 2026</p>
    </footer>

    <script>
        let libraryData = [
            { p: "المتنبي", t: "عزة النفس", c: "الخَيْلُ وَاللّيْلُ وَالبَيْداءُ تَعرِفُني.. وَالسّيْفُ وَالرّمْحُ وَالقِرْطاسُ وَالقَلَمُ" },
            { p: "نزار قباني", t: "الحب", c: "يا ولدي.. قد ماتَ شهيداً.. من ماتَ على دينِ المحبوب" },
            { p: "أحمد شوقي", t: "المعلم", c: "قُم لِلمُعَلِّمِ وَفِّهِ التَبجيلا.. كادَ المُعَلِّمُ أَن يَكونَ رَسولا" },
            { p: "عنترة بن شداد", t: "الفخر", c: "سَيَذكُرُني قَومي إِذا جَدَّ جِدُّهُم.. وَفي اللَّيلَةِ الظَلماءِ يُفتَقَدُ البَدرُ" },
            { p: "محمود درويش", t: "الأرض", c: "عَلى هَذِهِ الأَرْض مَا يَسْتَحِقُّ الحَيَاةْ" },
            { p: "امرؤ القيس", t: "الليل", c: "وَلَيْلٍ كَمَوْجِ البَحْرِ أَرْخَى سُدُولَهُ.. عَلَيَّ بِأَنْوَاعِ الهُمُومِ لِيَبْتَلِي" }
        ];

        // التعديل: عداد زوار واقعي باستخدام API حقيقي
        async function updateCounter() {
            try {
                // استخدام خدمة CountAPI (تأكد من استخدام مفتاح فريد لموقعك)
                const response = await fetch('https://api.countapi.xyz/hit/moh55md-athr-site/visits');
                const data = await response.json();
                document.getElementById('count').innerText = data.value;
            } catch (error) {
                // قيمة احتياطية في حال فشل الـ API
                document.getElementById('count').innerText = "١,٥٢٤";
            }
        }

        function renderLib(data = libraryData) {
            const container = document.getElementById('library-display');
            container.innerHTML = data.map(item => `
                <div class="glass-card p-10 rounded-xl relative overflow-hidden text-right">
                    <span class="text-[#c5a059] text-xs font-bold tracking-widest block mb-4 uppercase">${item.p}</span>
                    <h4 class="text-xl font-bold mb-6 reem border-r-2 border-[#c5a059] pr-3">${item.t}</h4>
                    <p class="amiri text-2xl leading-relaxed text-gray-200">${item.c}</p>
                </div>
            `).join('');
        }

        // خواطر الزوار (تخزين محلي للمتصفح حالياً)
        function postThought() {
            const name = document.getElementById('visitor-name').value || "عابر سبيل";
            const text = document.getElementById('visitor-thought').value;
            if(!text) return alert("اكتب شيئاً أولاً");
            
            const wall = document.getElementById('thoughts-wall');
            const note = document.createElement('div');
            note.className = "glass-card p-6 rounded-xl text-right border-white/5";
            note.innerHTML = `<p class="amiri text-xl italic text-gray-300 mb-2">"${text}"</p>
                             <span class="text-[#c5a059] text-sm font-bold">- ${name}</span>`;
            wall.prepend(note);
            document.getElementById('visitor-thought').value = "";
        }

        async function addPoemToLib() {
            const p = document.getElementById('adm-poet').value;
            const t = document.getElementById('adm-title').value;
            const c = document.getElementById('adm-content').value;
            const GITHUB_TOKEN = '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'; 
            const REPO_OWNER = 'moh55md';
            const REPO_NAME = 'athr';

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.html`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const fileData = await res.json();
                const content = decodeURIComponent(escape(atob(fileData.content)));
                const updatedContent = content.replace('let libraryData = [', `let libraryData = [\n            { p: "${p}", t: "${t}", c: "${c}" },`);

                await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.html`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `إضافة قصيدة: ${t}`,
                        content: btoa(unescape(encodeURIComponent(updatedContent))),
                        sha: fileData.sha
                    })
                });
                alert("تم الحفظ بنجاح!");
                location.reload();
            } catch (e) { alert("خطأ في الاتصال."); }
        }

        function toggleAdmin() {
            if(prompt("كلمة سر المالك:") === "admin123") {
                document.body.classList.toggle('admin-active');
            }
        }

        function searchLib() {
            const q = document.getElementById('libSearch').value.toLowerCase();
            const filtered = libraryData.filter(item => item.p.includes(q) || item.t.includes(q) || item.c.includes(q));
            renderLib(filtered);
        }

        window.onload = () => { renderLib(); updateCounter(); };
    </script>
</body>
</html>
